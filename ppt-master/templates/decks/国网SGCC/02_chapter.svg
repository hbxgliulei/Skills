<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <!-- 02_chapter.svg · SGCC 章节分隔 · 严格按原 PPTX slide3 坐标重建 -->
  <rect width="1280" height="720" fill="#FFFFFF"/>

  <!-- 顶部圆形装饰图 (原 pos=519,50 size=241x241) -->
  <image href="chapter_circle.jpeg" x="519" y="50" width="241" height="241" preserveAspectRatio="xMidYMid meet"/>

  <!-- 全宽横幅条 (原 pos=-1,224 size=1280x182) -->
  <rect x="-1" y="224" width="1282" height="182" fill="#2B9574"/>
  <rect x="-1" y="224" width="1282" height="6" fill="#00706B"/>
  <rect x="-1" y="400" width="1282" height="6" fill="#00706B"/>

  <!-- 下方装饰区 (原 组合5 pos=-1,406 size=1281x314) -->
  <rect x="-1" y="406" width="1282" height="314" fill="#F7FAF9"/>

  <!-- 章节标题 (原 pos=233,482 size=814x103) -->
  <text x="233" y="540" font-family="&quot;方正细黑&quot;, &quot;FZXiHei&quot;, &quot;Microsoft YaHei&quot;, sans-serif" font-size="52" font-weight="700" fill="#333333" letter-spacing="2">{{CHAPTER_TITLE}}</text>

  <!-- 章节编号 (横幅条内, 白色) -->
  <text x="233" y="330" font-family="&quot;Franklin Gothic Medium&quot;, Arial, sans-serif" font-size="80" font-weight="700" fill="#FFFFFF" letter-spacing="-2">{{CHAPTER_NUMBER}}</text>

  <!-- 章节英文副标 -->
  <text x="233" y="370" font-family="&quot;Franklin Gothic Medium&quot;, Arial, sans-serif" font-size="18" font-weight="500" fill="#ACE7D4" letter-spacing="3">{{CHAPTER_SUBTITLE}}</text>

  <!-- 底部装饰线 -->
  <rect x="233" y="580" width="120" height="4" fill="#2B9574"/>
  <text x="233" y="620" font-family="&quot;Microsoft YaHei&quot;, sans-serif" font-size="14" font-weight="400" fill="#999999">STATE GRID · 章节分隔</text>
</svg>
